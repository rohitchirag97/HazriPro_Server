name: HAZRI_CI_CD_PIPELINE

# Trigger the workflow on every push to the 'master' branch
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Match your VM Node.js version

      - name: 3. Install Dependencies and Build TypeScript
        run: |
          npm install
          npm run build
          ls -l dist

      - name: 4. Deploy Compiled Code via SSH/Rsync and Restart PM2
        uses: easingthemes/ssh-deploy@v4
        with:
          # --- CORRECTED SECRET REFERENCE ---
          ssh_private_key: ${{ secrets.HAZRI_CI_CD_PIPELINE }}
          # ----------------------------------
          remote_host: ${{ secrets.VM_HOST }}
          remote_user: deployer  # The dedicated user you created
          
          # Deployment Paths and Command
          source: 'dist/' 
          target: /home/ubuntu/HazriPro_Server/dist/
          
          # Commands to run ON THE VM after files are copied
          command: |
            echo "Deployment finished. Running remote commands..."
            cd /home/ubuntu/HazriPro_Server/
            npm install --production
            # Note: Ensure the 'deployer' user has sudo access without password prompt
            sudo pm2 restart hazripro-api 
            echo "PM2 restart command issued successfully."